[gcode_macro CALIBRAR_TODO_PID]
description: Calibración PID con GuppyScreen y sonidos BEEP del Helper Script.
gcode:
    {% set T_EXTRUDER = params.T_EXTRUDER|default(210)|float %}
    {% set T_BED = params.T_BED|default(60)|float %}

    # Inicio
    SET_DISPLAY_TEXT MSG="Iniciando PID..."
    G28
    G1 Z50 F3000
    
    # --- CALIBRACIÓN CAMA ---
    SET_DISPLAY_TEXT MSG="Paso 1/2: PID Cama ({T_BED}C)"
    BEEP I=1 DUR=500                ; Un beep largo al empezar
    PID_CALIBRATE HEATER=heater_bed TARGET={T_BED}
    
    # --- CALIBRACIÓN HOTEND ---
    SET_DISPLAY_TEXT MSG="Paso 2/2: PID Hotend ({T_EXTRUDER}C)"
    M106 S255                       ; Ventilador al 100%
    BEEP I=1 DUR=500                ; Un beep largo al empezar
    PID_CALIBRATE HEATER=extruder TARGET={T_EXTRUDER}
    
    # --- FINALIZACIÓN ---
    M106 S0
    G28
    SET_DISPLAY_TEXT MSG="¡OK! Pulsa SAVE_CONFIG"
    
    # Patrón de éxito: 3 beeps rápidos
    BEEP I=3 DUR=100 FREQ=2000
    
    {action_respond_info("Calibración completa. Ejecuta SAVE_CONFIG para guardar.")}

