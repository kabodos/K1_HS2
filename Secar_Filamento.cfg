[gcode_macro DRY_PETG_6H]
description: Secar PETG durante 6 horas
gcode:
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=65
    UPDATE_DELAYED_GCODE ID=DRY_PETG_OFF DURATION=21600
    RESPOND MSG="Secado PETG iniciado. Se apagara en 6 horas."

[delayed_gcode DRY_PETG_OFF]
gcode:
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
    RESPOND MSG="Secado PETG finalizado. Cama apagada."

[delayed_gcode TEST_DELAY]
gcode:
    RESPOND MSG="Delayed OK"